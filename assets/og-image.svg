<?xml version="1.0" encoding="UTF-8"?>
<!-- og-image fuente editable, 1200x630. Rasterizar a assets/og-image.png antes de desplegar. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#0f1219"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="55%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- red de nodos (eco del particle field) -->
  <g stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="930" y1="110" x2="1050" y2="180"/>
    <line x1="1050" y1="180" x2="1010" y2="300"/>
    <line x1="1010" y1="300" x2="900" y2="250"/>
    <line x1="900" y1="250" x2="930" y2="110"/>
    <line x1="1050" y1="180" x2="1140" y2="130"/>
  </g>
  <g fill="#60a5fa">
    <circle cx="930" cy="110" r="5"/>
    <circle cx="1050" cy="180" r="6"/>
    <circle cx="1010" cy="300" r="5"/>
    <circle cx="900" cy="250" r="4"/>
    <circle cx="1140" cy="130" r="4"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="170" font-family="Inter, sans-serif" font-size="26" font-weight="600"
        letter-spacing="3" fill="#60a5fa">CLARITY STATE AI</text>

  <!-- headline -->
  <text x="88" y="290" font-family="Fraunces, Georgia, serif" font-size="74" font-weight="500" fill="#f0f4f8">El cerebro de tu empresa,</text>
  <text x="88" y="372" font-family="Fraunces, Georgia, serif" font-size="74" font-weight="500" font-style="italic" fill="#f0f4f8">con una memoria viva.</text>

  <!-- subline -->
  <text x="90" y="445" font-family="Inter, sans-serif" font-size="30" fill="#8892a4">Memoria viva para la operación, el riesgo y el cliente.</text>

  <!-- footer line -->
  <rect x="90" y="520" width="46" height="3" fill="#3b82f6"/>
  <text x="90" y="558" font-family="Inter, sans-serif" font-size="24" font-weight="500" fill="#cbd5e1">claritystateai.com</text>
  <text x="1110" y="558" text-anchor="end" font-family="Inter, sans-serif" font-size="22" fill="#8892a4">Diagnóstico de 30 min</text>
</svg>
